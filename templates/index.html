<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演唱會釋票監控系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e7e7e7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --accent-color: #8c7b75;
            --border-color: #e5e0dc;
        }

        body { 
            font-family: 'Chiron GoRound TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#f0f0f0 20%, transparent 20%);
            background-size: 30px 30px; 
            color: var(--text-main);
            font-size: 14px; 
            font-weight: 700;
            line-height: 1.6;
        }

        h1 { color: #1a1a1a; margin-bottom: 10px; text-align: center; font-size: 26px; font-weight: 700; }
        .subtitle { color: #444; margin-bottom: 20px; font-size: 14px; text-align: center; line-height: 1.4; font-weight: 700; }
        
        .author { font-size: 13px; color: #666; margin-bottom: 20px; text-align: center; font-weight: 700; }
        .author a { color: var(--accent-color); text-decoration: none; font-weight: 700; margin: 0 8px; white-space: nowrap; display: inline-block; }
        
        .event-card { background: var(--card-bg); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border-color); box-shadow: 0 2px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .event-header { padding: 15px; }
        .main-info { display: flex; align-items: center; gap: 12px; }
        
        .notify-control { display: flex; align-items: center; justify-content: center; min-width: 30px; }
        .notify-control input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-color); }
        
        .event-info { flex-grow: 1; min-width: 0; }
        .event-name { font-size: 15px; font-weight: 700; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-meta { font-size: 12px; color: #999; margin-top: 2px; font-weight: 700; }
        
        .status-badge { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 700; min-width: 65px; text-align: center; white-space: nowrap; }
        .status-sold-out { background-color: #f0f0f0; color: #888; border: 1px solid #e0e0e0; }
        .status-available { background-color: #eee9e6; color: var(--accent-color); border: 1px solid #dcd3ce; }
        
        .toggle-btn { text-align: left; margin-top: 12px; font-size: 13px; color: #888; cursor: pointer; border-top: 1px solid #f9f9f9; padding-top: 8px; font-weight: 700; }
        .event-details { display: none; padding: 12px 15px; border-top: 1px solid #f9f9f9; background: #fafafa; font-size: 14px; text-align: left; font-weight: 700; }
        
        .notification-btn { display: block; width: 100%; max-width: 200px; margin: 0 auto 6px auto; background: #222; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; }
        .notification-hint { text-align: center; font-size: 12px; color: #999; margin-bottom: 20px; font-weight: 700; }
        
        .text-soldout { color: #888; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>

    <div>
        <h1>꒰ 演唱會釋票監控系統 ꒱</h1>
        <div class="subtitle">🪄 請先點擊［開啟通知 💌］鍵，再勾選下方監控場次‪₊ʚɞ</div>
        <div class="author">
            <a href="https://www.threads.com/@___lunarecho" target="_blank">Threads｜@___lunarecho</a>
            <a href="https://lin.ee/ouqhqZD" target="_blank">LINE｜＠963maprr</a>
        </div>
        <button class="notification-btn" onclick="requestNotificationPermission()">開啟通知 💌</button>
        <div class="notification-hint" id="permission-hint"></div>
    </div>

    <div id="events-container">
        {% for ev_id, ev in events.items() %}
        <div class="event-card" id="card-{{ ev_id }}">
            <div class="event-header">
                <div class="main-info">
                    <div class="notify-control">
                        <input type="checkbox" id="notify-toggle-{{ ev_id }}" onchange="handleCheckboxChange('{{ ev_id }}', this.checked)">
                    </div>
                    <div class="event-info">
                        <div class="event-name">{{ ev.name }}</div>
                        <div class="event-meta">更新：{{ ev.updated_at or '尚未取得資料' }}</div>
                    </div>
                    <span id="badge-{{ ev_id }}" class="status-badge status-sold-out">已售完 🈳</span>
                </div>
                <div class="toggle-btn" onclick="toggleDetails('{{ ev_id }}')">🔽 展開完整票池狀況</div>
            </div>
            
            <div class="event-details" id="details-{{ ev_id }}">
                <a href="{{ ev.url }}" target="_blank" style="color: var(--accent-color); font-weight: 700; text-decoration: none; display: block; margin-bottom: 8px;">➡️ 前往購票頁面</a>
                <ul id="ticket-list-{{ ev_id }}" style="padding-left: 20px; color: #444; margin-top: 8px; font-size: 13px; list-style-type: none;">
                    <li class="text-soldout text-center py-1">🔒 目前所有區域均無釋票</li>
                </ul>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const STORAGE_KEY = 'ticket_monitor_subscriptions';
        let subscriptions = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
        let lastKnownHasTicket = {};

        window.addEventListener('DOMContentLoaded', () => {
            subscriptions.forEach(id => {
                const box = document.getElementById('notify-toggle-' + id);
                if (box) box.checked = true;
            });
            updatePermissionHint();
        });

        function updatePermissionHint() {
            const hint = document.getElementById('permission-hint');
            if (Notification.permission === 'granted') hint.innerText = '✅ 通知已開啟';
            else if (Notification.permission === 'denied') hint.innerText = '❎ 通知已被封鎖';
            else hint.innerText = '尚未開啟通知';
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(() => updatePermissionHint());
        }

        function handleCheckboxChange(id, checked) {
            checked ? subscriptions.add(id) : subscriptions.delete(id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(subscriptions)));
        }

        function toggleDetails(id) {
            const el = document.getElementById('details-' + id);
            const btn = event.currentTarget;
            if (el.style.display === 'block') {
                el.style.display = 'none';
                btn.innerText = '🔽 展開完整票池狀況';
            } else {
                el.style.display = 'block';
                btn.innerText = '🔼 收起完整票池狀況';
            }
        }

        function fireNotification(eventName) {
            if (Notification.permission === 'granted') {
                new Notification('🎫 釋票通知!', { body: eventName + ' 出現可購買的票券!' });
            }
        }

        setInterval(() => {
            fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                for (let id in data) {
                    let ev = data[id];
                    let badge = document.getElementById('badge-' + id);
                    let listUl = document.getElementById('ticket-list-' + id);
                    if (!badge || !listUl) continue;

                    let hasTicket = false;
                    let listHtml = '';
                    for (let zone in ev.tickets) {
                        if (ev.tickets[zone] !== "已售完") {
                            hasTicket = true;
                            listHtml += `<li style="margin-bottom: 5px;">🚨 ${zone}: <b style="color: #dc3545;">${ev.tickets[zone]}</b></li>`;
                        }
                    }

                    if (!hasTicket) listHtml = `<li class="text-soldout text-center py-1">🔒 目前所有區域均無釋票 (已售完)</li>`;
                    listUl.innerHTML = listHtml;

                    if (hasTicket) {
                        badge.innerText = "還有票 🎫";
                        badge.className = "status-badge status-available";
                    } else {
                        badge.innerText = "已售完 🈳";
                        badge.className = "status-badge status-sold-out";
                    }

                    if (lastKnownHasTicket[id] === false && hasTicket === true && subscriptions.has(id)) {
                        fireNotification(ev.name);
                    }
                    lastKnownHasTicket[id] = hasTicket;
                }
            });
        }, 15000);
    </script>
</body>
</html>
